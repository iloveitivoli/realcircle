<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B6E4F">
<title>真人圈 RealCircle</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
  :root{
    --green:#0B6E4F;--green-d:#0a5c42;--green-l:#E8F3EE;--ink:#16181c;--gray:#8a9099;
    --bg:#f3f4f3;--card:#fff;--line:#e8e8e6;--gold:#C9A227;--red:#D64545;--blue:#1d9bf0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans Arabic",sans-serif;}
  html,body{height:100%;}
  body{background:#dfe1df;color:var(--ink);}
  [dir="rtl"]{direction:rtl;}
  #app{max-width:600px;margin:0 auto;height:100vh;height:100dvh;background:var(--bg);box-shadow:0 0 50px rgba(0,0,0,.1);display:flex;flex-direction:column;position:relative;overflow:hidden;}
  /* 视图容器:占满 #app 并作为 flex 列,使内部 content 撑开、tabbar/chatbar 始终贴底 */
  #view{flex:1;display:flex;flex-direction:column;min-height:0;}
  /* top bar */
  .topbar{position:sticky;top:0;z-index:40;height:54px;background:var(--card);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;backdrop-filter:saturate(1.8) blur(6px);}
  .logo{font-weight:800;font-size:18px;color:var(--green);display:flex;align-items:center;gap:6px;}
  .logo span{color:var(--ink);}
  .tbtn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink);position:relative;padding:6px;}
  .dot{position:absolute;top:2px;right:2px;width:9px;height:9px;background:var(--red);border-radius:50%;border:2px solid var(--card);}
  .content{flex:1;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  /* tab bar:在 #view 的 flex 流中由 content(flex:1) 顶到底部,不再浮空 */
  .tabbar{flex-shrink:0;z-index:40;height:60px;padding-bottom:env(safe-area-inset-bottom);background:var(--card);border-top:1px solid var(--line);display:flex;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10.5px;color:var(--gray);cursor:pointer;border:none;background:none;position:relative;}
  .tab .ic{font-size:20px;line-height:1;}
  .tab.on{color:var(--green);font-weight:700;}
  .tab .ndot{position:absolute;top:8px;right:calc(50% - 16px);width:8px;height:8px;background:var(--red);border-radius:50%;}
  /* generic */
  .card{background:var(--card);border-radius:16px;margin-bottom:10px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .row{display:flex;align-items:center;gap:10px;}
  .col{display:flex;flex-direction:column;}
  .spacer{flex:1;}
  .muted{color:var(--gray);font-size:12px;}
  .ava{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;width:40px;height:40px;font-size:17px;background:var(--green);}
  .name{font-size:14px;font-weight:700;}
  .vbadge{display:inline-flex;align-items:center;gap:2px;font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:99px;vertical-align:middle;}
  .v1{background:#eee;color:#888;}.v2{background:var(--green-l);color:var(--green);}
  .v3{background:#FFF6DC;color:#9a7b12;}.v4{background:#16181c;color:var(--gold);}
  .cam{display:inline-block;font-size:9.5px;color:var(--green);background:var(--green-l);padding:2px 7px;border-radius:99px;font-weight:800;}
  .ptext{font-size:14.5px;line-height:1.6;margin:10px 0 8px;white-space:pre-wrap;word-break:break-word;}
  .acts{display:flex;gap:20px;font-size:13px;color:var(--gray);}
  .acts button{background:none;border:none;color:var(--gray);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;}
  .acts button.liked{color:var(--red);}
  .btn{display:block;width:100%;background:var(--green);color:#fff;border:none;font-size:15px;font-weight:700;padding:13px;border-radius:13px;cursor:pointer;transition:.15s;}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.5;}
  .btn.ghost{background:#fff;color:var(--green);border:1.5px solid var(--green);}
  .btn.sm{width:auto;padding:7px 16px;font-size:12.5px;border-radius:99px;}
  input,textarea,select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:14px;background:#fff;outline:none;color:var(--ink);font-family:inherit;}
  input:focus,textarea:focus{border-color:var(--green);}
  .banner{background:var(--green-l);border:1px solid #bcd9cd;color:var(--green);font-size:12px;border-radius:12px;padding:10px 13px;margin-bottom:10px;line-height:1.6;}
  .banner.warn{background:#FFF1F1;border-color:#f3c8c8;color:var(--red);}
  #toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:rgba(22,24,28,.94);color:#fff;font-size:13px;padding:10px 18px;border-radius:99px;opacity:0;transition:.25s;z-index:200;pointer-events:none;max-width:90%;text-align:center;}
  #toast.show{opacity:1;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;color:var(--gray);}
  .spin{width:26px;height:26px;border:3px solid var(--green-l);border-top-color:var(--green);border-radius:50%;animation:r .7s linear infinite;margin:30px auto;}
  @keyframes r{to{transform:rotate(360deg)}}
  /* auth */
  .auth{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px;background:linear-gradient(165deg,#0B6E4F,#073d2c);color:#fff;overflow-y:auto;}
  .auth .box{background:#fff;border-radius:22px;padding:26px;color:var(--ink);box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .auth input{margin-bottom:11px;}
  .langsel{display:flex;gap:7px;justify-content:center;margin-bottom:18px;}
  .langsel button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;}
  .langsel button.on{background:var(--gold);color:#16181c;border-color:var(--gold);}
  /* verify */
  .face{width:150px;height:150px;border-radius:50%;border:4px dashed var(--green);margin:18px auto;display:flex;align-items:center;justify-content:center;font-size:58px;background:var(--green-l);position:relative;overflow:hidden;}
  .scan{position:absolute;left:0;right:0;height:3px;background:var(--green);animation:sc 1.5s ease-in-out infinite;box-shadow:0 0 14px var(--green);}
  @keyframes sc{0%,100%{top:12%}50%{top:84%}}
  .vlevel{display:flex;gap:8px;margin-bottom:14px;}
  .vl{flex:1;text-align:center;padding:8px 4px;border-radius:10px;background:#fff;border:1px solid var(--line);font-size:11px;}
  .vl.cur{border-color:var(--green);background:var(--green-l);color:var(--green);font-weight:800;}
  /* stories */
  .stories{display:flex;gap:13px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:none;}
  .stories::-webkit-scrollbar{display:none;}
  .story{text-align:center;font-size:10.5px;flex-shrink:0;cursor:pointer;width:60px;}
  .story .ring{width:56px;height:56px;border-radius:50%;padding:2.5px;margin:0 auto 4px;background:linear-gradient(45deg,var(--green),var(--gold));}
  .story .ring.seen{background:#d5d5d3;}
  .story .ring .ava{width:100%;height:100%;border:2px solid #fff;}
  .story .add{width:56px;height:56px;border-radius:50%;border:2px dashed var(--green);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--green);margin:0 auto 4px;}
  /* video */
  .videofeed{margin:-12px;}
  .vcard{position:relative;height:calc(100vh - 132px);min-height:480px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;color:#fff;border-bottom:6px solid var(--bg);}
  .vcard .vbg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;}
  .vside{position:absolute;bottom:90px;display:flex;flex-direction:column;gap:18px;align-items:center;font-size:11px;text-align:center;z-index:2;}
  .vside button{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;}
  /* events / seats */
  .seat{display:inline-flex;width:26px;height:26px;border-radius:50%;font-size:12px;align-items:center;justify-content:center;color:#fff;margin-inline-end:4px;}
  /* chat */
  .msgrow{display:flex;margin-bottom:9px;}
  .msgrow.me{justify-content:flex-end;}
  .bubble{max-width:74%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.45;background:#fff;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.05);}
  .me .bubble{background:var(--green);color:#fff;}
  .chatbar{flex-shrink:0;background:var(--card);border-top:1px solid var(--line);padding:9px 10px;padding-bottom:calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;}
  .chatbar input{flex:1;}
  .chatbar button{background:var(--green);color:#fff;border:none;border-radius:12px;padding:0 18px;font-weight:700;cursor:pointer;}
  .hidden{display:none!important;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .sheet{background:var(--card);width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:18px;max-height:85vh;overflow-y:auto;}
  .seg{display:flex;background:var(--green-l);border-radius:11px;padding:3px;margin-bottom:12px;}
  .seg button{flex:1;border:none;background:none;padding:8px;border-radius:9px;font-size:13px;font-weight:700;color:var(--green);cursor:pointer;}
  .seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);}
</style>
</head>

async function api(method, path, body){
  const r = await fetch(path, { method, headers:{ 'Content-Type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}) }, body: body?JSON.stringify(body):undefined });
  let data={}; try{ data=await r.json(); }catch{}
  if(!r.ok){ const e=new Error(data.error||('HTTP '+r.status)); e.code=data.error; throw e; }
  return data;
}

function avaColor(n){ const cs=['#5B8DEF','#E8956B','#9B7EDE','#4EA8A0','#D6708B','#C9A227','#0B6E4F']; let h=0; for(const c of (n||'?')) h=(h*31+c.charCodeAt(0))>>>0; return cs[h%cs.length]; }
function ava(u,sz){ const n=(u&&u.nickname)||'?'; return `<div class="ava" style="background:${avaColor(n)};${sz?`width:${sz}px;height:${sz}px;font-size:${sz*0.42}px;`:''}">${esc(n[0])}</div>`; }
function ago(ts){ const s=(Date.now()-ts)/1000; if(s<60)return t('justnow'); if(s<3600)return Math.floor(s/60)+t('mago'); if(s<86400)return Math.floor(s/3600)+t('hago'); return Math.floor(s/86400)+t('dago'); }

const TABS=[['feed','🏠'],['video','🎬'],['events','📍'],['chat','💬'],['me','👤']];
function shell(inner, topRight){
  return `<div class="topbar">
    <div class="logo">真人<span>圈</span></div>
    <div class="row">${topRight||''}
      <button class="tbtn" onclick="go('search')">🔍</button>

async function go(v, arg){
  view=v; chatWith=(v==='chat'&&arg)?arg:(v==='chat'?null:null);
  if(v==='chat'&&arg) chatWith=arg;
  if(v==='profile') chatWith=arg;
  clearInterval(pollTimer); pollTimer=null; chatRefresh=null;
  render();
}
async function boot(){
  applyDir();
  if(!token){ return renderAuth(); }
  try{ const r=await api('GET','/api/me'); me=r.user; me.isAdmin=r.isAdmin; }
  catch{ token=''; localStorage.removeItem('token'); return renderAuth(); }
  refreshUnread();
  connectWS();
  render();
}
async function refreshUnread(){ try{ const r=await api('GET','/api/notifications'); unread=r.unread; }catch{} }

/* ==================== 实时推送(WebSocket,轮询为降级兜底) ==================== */
function connectWS(){
  if(!token) return;
  if(ws && (ws.readyState===0 || ws.readyState===1)) return; // 已连接/连接中
  let sock; try{ sock=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws', [token]); }
  catch{ return; } // 浏览器不支持时静默降级为轮询
  ws=sock;
  sock.onopen=()=>{ wsRetry=0; };
  sock.onmessage=ev=>{ let d; try{ d=JSON.parse(ev.data); }catch{ return; } handleWS(d); };
  sock.onerror=()=>{ try{ sock.close(); }catch{} };
  sock.onclose=()=>{ if(ws===sock) ws=null; if(token){ wsRetry=Math.min(wsRetry+1,6); setTimeout(connectWS, 800*wsRetry); } };
}
function disconnectWS(){ const w=ws; ws=null; if(w){ try{ w.onclose=null; w.close(); }catch{} } }
function handleWS(d){
  if(d.type==='message'){
    // 正在与对端聊天 → 实时刷新气泡;否则在会话列表则刷新列表
    const m=d.message;
    if(view==='chat' && chatWith && (m.from===chatWith || m.to===chatWith) && chatRefresh){ chatRefresh(); }
    else if(view==='chat' && !chatWith){ renderChats(); }
  } else if(d.type==='notify'){
    unread++;
    if(view==='notif'){ renderNotif(); }
    else if(view==='chat' && !chatWith){ renderChats(); }
    else{ const dot=$('#bellDot'); if(dot) dot.style.display='inline-block'; const nd=$('#chatNdot'); if(nd) nd.style.display='inline-block'; }
  }
}
function render(){
  const map={ feed:renderFeed, video:renderVideo, events:renderEvents, chat:(chatWith?renderChat:renderChats),
    me:renderMe, profile:renderProfile, notif:renderNotif, search:renderSearch, verify:renderVerify };
  if(!token) return renderAuth();
  if(me.level<2 && !['me','verify','profile','notif','search'].includes(view)) return renderVerify();
  (map[view]||renderFeed)();
}

      <span><b>${u.followers}</b> ${esc(t('followers'))}</span><span><b>${u.following}</b> ${esc(t('followingC'))}</span><span><b>${u.meetCount}</b> ${esc(t('meet'))}</span></div>
    <div style="margin-top:14px;">${isMe?
      `<button class="btn sm ghost" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)" onclick="editProfile()">${esc(t('editp'))}</button>`:
      `<button class="btn sm" style="background:#fff;color:var(--green)" onclick="toggleFollow('${u.id}',this)">${u.isFollowing?t('unfollow'):t('follow')}</button>
       <button class="btn sm ghost" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4);margin-inline-start:8px;" onclick="go('chat','${u.id}')">${esc(t('dm'))}</button>`}</div></div>`;
  const posts = data.posts.length?data.posts.map(postCard).join(''):`<div class="banner">${esc(t('empty'))}</div>`;
  const extra = isMe? `
    ${me.level<2?`<div class="card" style="cursor:pointer" onclick="go('verify')"><b>${esc(t('verifyNow'))}</b><div class="muted" style="margin-top:4px;">${esc(t('verifyNow_d'))}</div></div>`:''}
    ${me.isAdmin?`<div class="card" style="cursor:pointer" onclick="go('search');openAdmin()"><b>${esc(t('admin'))}</b></div>`:''}
    <div class="card"><b>${esc(t('privacy'))}</b><div class="muted" style="margin-top:4px;">${esc(t('privacy_d'))}</div></div>
    <div class="card"><b>${esc(t('hunter'))}</b><div class="muted" style="margin-top:4px;">${esc(t('hunter_d'))}</div></div>
    <div class="langsel" style="margin:12px 0">${['zh','en','ar'].map(l=>`<button class="${lang===l?'on':''}" style="background:${lang===l?'var(--gold)':'var(--green-l)'};color:${lang===l?'#16181c':'var(--green)'};border:none" onclick="setLang('${l}')">${{zh:'中文',en:'EN',ar:'عربي'}[l]}</button>`).join('')}</div>
    <button class="btn ghost" onclick="logout()">${esc(t('logout'))}</button>`:'';
  $('#view').innerHTML = `${head}<div class="content" style="padding-top:12px">${extra}${posts}</div>
    <div class="tabbar">${TABS.map(([id,ic])=>`<button class="tab ${view==='me'&&id==='me'?'on':''}" onclick="go('${id}')"><span class="ic">${ic}</span>${t('tab_'+id)}</button>`).join('')}</div>`;
}
async function toggleFollow(uid,btn){ try{ const r=await api('POST',`/api/users/${uid}/follow`); btn.textContent=r.isFollowing?t('unfollow'):t('follow'); }catch(e){ toast(errMsg(e)); } }
function editProfile(){
  const m=document.createElement('div'); m.className='modal'; m.onclick=e=>{if(e.target===m)m.remove();};
  m.innerHTML=`<div class="sheet"><b>${esc(t('editp'))}</b><div style="height:12px"></div>
    <input id="enick" value="${esc(me.nickname)}" maxlength="20"><div style="height:8px"></div>
    <textarea id="ebio" rows="3" maxlength="200" placeholder="${esc(t('bio_empty'))}">${esc(me.bio||'')}</textarea><div style="height:12px"></div>
    <button class="btn" onclick="saveProfile(this)">${esc(t('save'))}</button></div>`;
  document.body.appendChild(m);
}
async function saveProfile(btn){ try{ const r=await api('POST','/api/me',{nickname:$('#enick').value,bio:$('#ebio').value}); me=r.user; btn.closest('.modal').remove(); toast('✓'); render(); }catch(e){ toast(errMsg(e)); } }
function logout(){ api('POST','/api/logout').catch(()=>{}); disconnectWS(); token=''; me=null; localStorage.removeItem('token'); view='feed'; renderAuth(); }

/* ==================== notifications ==================== */
async function renderNotif(){
  $('#view').innerHTML = shell(`<div id="nlist"><div class="spin"></div></div>`);
  try{ const {notifications}=await api('GET','/api/notifications'); await api('POST','/api/notifications/read'); unread=0;
    const verb={like:lang==='ar'?'أعجب بمنشورك':(lang==='en'?'liked your post':'赞了你的动态'),comment:lang==='ar'?'علّق على منشورك':(lang==='en'?'commented':'评论了你'),follow:lang==='ar'?'تابعك':(lang==='en'?'followed you':'关注了你'),message:lang==='ar'?'راسلك':(lang==='en'?'messaged you':'给你发了消息')};
    const el=$('#nlist'); if(!el)return;
    el.innerHTML = notifications.length?notifications.map(n=>`<div class="card row" onclick="go('profile','${n.from.id}')" style="cursor:pointer">${ava(n.from,38)}<div class="col"><div class="name">${esc(n.from.nickname)} ${badge(n.from.level)}</div><div class="muted">${verb[n.type]||n.type} · ${ago(n.ts)}</div></div></div>`).join(''):`<div class="banner">${esc(t('noNotif'))}</div>`;
  }catch(e){ $('#nlist').innerHTML=`<div class="banner warn">${esc(errMsg(e))}</div>`; }
}

/* ==================== search ==================== */
async function renderSearch(){
  $('#view').innerHTML = shell(`<input id="sq" placeholder="${esc(t('search'))}" oninput="doSearch(this.value)" autofocus><div id="sres" style="margin-top:10px"></div>`);
}
let _st=null;
function doSearch(q){ clearTimeout(_st); _st=setTimeout(async()=>{ if(!q.trim()){$('#sres').innerHTML='';return;} try{ const r=await api('GET','/api/search?q='+encodeURIComponent(q)); const el=$('#sres'); if(!el)return;
  el.innerHTML = r.users.map(u=>`<div class="card row" onclick="go('profile','${u.id}')" style="cursor:pointer">${ava(u,40)}<div class="col"><div class="name">${esc(u.nickname)} ${badge(u.level)}</div><div class="muted">${esc(u.bio||t('bio_empty'))}</div></div></div>`).join('') + r.posts.map(postCard).join('');
  if(!r.users.length&&!r.posts.length) el.innerHTML=`<div class="banner">${esc(t('empty'))}</div>`;
}catch(e){ toast(errMsg(e)); } },300); }

/* ==================== admin ==================== */
async function openAdmin(){
  try{ const {queue}=await api('GET','/api/admin/reports');
    const m=document.createElement('div'); m.className='modal'; m.onclick=e=>{if(e.target===m)m.remove();};
    m.innerHTML=`<div class="sheet"><b>${esc(t('admin'))}</b><div style="margin-top:12px">${queue.length?queue.map(q=>`<div class="card"><div class="ptext">${esc(q.post.text)}</div><div class="muted">举报 ${q.reports} 次 · ${q.removed?'已下架':'待处理'}</div>${q.removed?`<button class="btn sm" style="margin-top:8px" onclick="restorePost('${q.post.id}',this)">恢复</button>`:''}</div>`).join(''):`<div class="banner">${esc(t('noNotif'))}</div>`}</div></div>`;
    document.body.appendChild(m);
  }catch(e){ toast(errMsg(e)); }
}
async function restorePost(id,btn){ try{ await api('POST',`/api/admin/posts/${id}/restore`); btn.closest('.modal').remove(); toast('✓'); }catch(e){ toast(errMsg(e)); } }

/* ==================== start ==================== */
boot();
</script>
</body>
</html>
